<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Kotoba Learning</title>
    <style>
        :root {
            --primary: #e74c3c;
            --primary-hover: #c0392b;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --bg: #f5f7fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
        }

        h1 { color: var(--primary); }

        .hidden { display: none !important; }

        /* Main Menu Styles */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .level-card {
            border: 2px solid var(--light);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .level-card:hover {
            border-color: var(--primary);
            background-color: rgba(231, 76, 60, 0.02);
            transform: translateY(-2px);
        }

        .level-card h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--dark);
        }

        /* Form Styles */
        .setup-section {
            margin-top: 20px;
            background: var(--bg);
            padding: 20px;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: #7f8c8d; margin-top: 10px; }
        .btn-secondary:hover { background: #95a5a6; }

        /* Quiz Styles */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .question-box {
            text-align: center;
            font-size: 2.5rem;
            margin: 30px 0;
            font-weight: bold;
            min-height: 80px;
        }

        .romaji-box {
            text-align: center;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .romaji-btn {
            background: #e0e0e0;
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--light);
            padding: 15px;
            text-align: left;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: var(--light);
            border-color: #bdc3c7;
        }

        /* Result Styles */
        .result-box {
            text-align: center;
            padding: 20px 0;
        }
        .score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Nihongo Kotoba Quiz</h1>
        <p>Kuasai Kosakata JLPT N5 & N4 dengan Mudah</p>
    </header>

    <!-- Halaman Utama / Pemilihan Level -->
    <div id="main-menu">
        <h3 style="text-align: center; margin-bottom: 15px;">Pilih Level Pembelajaran:</h3>
        <div class="menu-grid">
            <div class="level-card" onclick="selectLevel('N5')">
                <h2>JLPT N5</h2>
                <p>Kosakata Dasar (Dasar Pemula)</p>
            </div>
            <div class="level-card" onclick="selectLevel('N4')">
                <h2>JLPT N4</h2>
                <p>Kosakata Tingkat Lanjut Dasar</p>
            </div>
        </div>
    </div>

    <!-- Halaman Pengaturan Kuis -->
    <div id="quiz-setup" class="hidden">
        <h2 id="setup-title">Pengaturan Kuis N5</h2>
        
        <div class="setup-section">
            <div class="form-group">
                <label for="bab-select">Pilih Bab / Materi:</label>
                <select id="bab-select">
                    <!-- Diisi via JavaScript -->
                </select>
            </div>

            <div class="form-group">
                <label for="mode-select">Mode Soal:</label>
                <select id="mode-select">
                    <option value="jp-id">Soal: Jepang ➔ Jawab: Indonesia</option>
                    <option value="id-jp">Soal: Indonesia ➔ Jawab: Jepang</option>
                </select>
            </div>

            <div class="form-group">
                <label for="amount-select">Jumlah Soal:</label>
                <select id="amount-select" onchange="toggleCustomAmount(this.value)">
                    <option value="10">10 Soal</option>
                    <option value="20">20 Soal</option>
                    <option value="35">35 Soal</option>
                    <option value="55">55 Soal</option>
                    <option value="custom">Kustom (Sampai 200)</option>
                </select>
            </div>

            <div class="form-group hidden" id="custom-amount-container">
                <label for="custom-amount">Masukkan Jumlah (Maks 200):</label>
                <input type="number" id="custom-amount" min="1" max="200" value="100">
            </div>

            <button class="btn" onclick="startQuiz()">Mulai Tantangan</button>
            <button class="btn btn-secondary" onclick="goBack('main-menu')">Kembali ke Menu Utama</button>
        </div>
    </div>

    <!-- Halaman Area Kuis -->
    <div id="quiz-area" class="hidden">
        <div class="quiz-header">
            <span id="progress-text">Soal 1 dari 10</span>
            <span id="score-text">Skor: 0</span>
        </div>

        <div class="question-box" id="question-text">
            <!-- Soal muncul di sini -->
        </div>

        <div class="romaji-box">
            <button class="romaji-btn" id="romaji-toggle-btn" onclick="revealRomaji()">Klik untuk lihat Romaji</button>
            <p id="romaji-text" class="hidden" style="font-weight: 500; color: #7f8c8d;"></p>
        </div>

        <div class="options-grid" id="options-container">
            <!-- Pilihan jawaban muncul di sini -->
        </div>
        
        <button class="btn btn-secondary" style="margin-top: 30px;" onclick="confirmExit()">Keluar Kuis</button>
    </div>

    <!-- Halaman Hasil Skor -->
    <div id="result-area" class="hidden">
        <div class="result-box">
            <h2>Tantangan Selesai!</h2>
            <div class="score" id="final-score">0</div>
            <p id="result-summary">Kamu menjawab X dari Y soal dengan benar.</p>
            <br><br>
            <button class="btn" onclick="restartSetup()">Main Lagi</button>
            <button class="btn btn-secondary" onclick="goBack('main-menu')">Menu Utama</button>
        </div>
    </div>
</div>

<script>
    // DATA KOSAKATA (Daftar ini bisa kamu perbanyak sampai ratusan kotoba)
    const vocabulary = {
        N5: {
            "Bab 1: Salam & Perkenalan": [
                { jp: "あなた", romaji: "anata", id: "Anda / Kamu" },
                { jp: "これ", romaji: "kore", id: "Ini (dekat pembicara)" },
                { jp: "ここ", romaji: "koko", id: "Di sini" },
                { jp: "だれ", romaji: "dare", id: "Siapa" },
                { jp: "ともだち", romaji: "tomodachi", id: "Teman" }
            ],
            "Bab 2: Kata Kerja Dasar": [
                { jp: "いく", romaji: "iku", id: "Pergi" },
                { jp: "くる", romaji: "kuru", id: "Datang" },
                { jp: "たべる", romaji: "taberu", id: "Makan" },
                { jp: "のむ", romaji: "nomu", id: "Minum" },
                { jp: "みる", romaji: "miru", id: "Melihat / Menonton" }
            ],
            "Bab 3: Kata Sifat & Waktu": [
                { jp: "あつい", romaji: "atsui", id: "Panas" },
                { jp: "さむい", romaji: "samui", id: "Dingin (cuaca)" },
                { jp: "いま", romaji: "ima", id: "Sekarang" },
                { jp: "きょう", romaji: "kyou", id: "Hari ini" }
            ]
        },
        N4: {
            "Bab 1: Kehidupan Sehari-hari": [
                { jp: "あつめる", romaji: "atsumeru", id: "Mengumpulkan" },
                { jp: "いのる", romaji: "inoru", id: "Berdoa" },
                { jp: "うける", romaji: "ukeru", id: "Menerima / Mengikuti (ujian)" },
                { jp: "うごく", romaji: "ugoku", id: "Bergerak" }
            ],
            "Bab 2: Dunia Kerja & Fasilitas": [
                { jp: "かいぎ", romaji: "kaigi", id: "Rapat / Rapat kerja" },
                { jp: "こうじょう", romaji: "koujou", id: "Pabrik" },
                { jp: "ちゅうしゃじょう", romaji: "chuushajou", id: "Tempat Parkir" },
                { jp: "じむしょ", romaji: "jimusho", id: "Kantor" }
            ]
        }
    };

    // State Aplikasi
    let currentLevel = "";
    let selectedBab = "";
    let quizMode = ""; // "jp-id" atau "id-jp"
    let totalQuestions = 10;
    let quizPool = [];
    let currentQuestionIndex = 0;
    let score = 0;

    // Navigasi Halaman
    function showScreen(screenId) {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('quiz-setup').classList.add('hidden');
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.add('hidden');
        
        document.getElementById(screenId).classList.remove('hidden');
    }

    function goBack(screenId) {
        showScreen(screenId);
    }

    // Pilih Level (N5 / N4)
    function selectLevel(level) {
        currentLevel = level;
        document.getElementById('setup-title').innerText = `Pengaturan Kuis - JLPT ${level}`;
        
        // Load Bab berdasarkan level yang dipilih
        const babSelect = document.getElementById('bab-select');
        babSelect.innerHTML = '<option value="semua">Semua Bab (Gabungan)</option>';
        
        for (let bab in vocabulary[level]) {
            let opt = document.createElement('option');
            opt.value = bab;
            opt.innerHTML = bab;
            babSelect.appendChild(opt);
        }

        showScreen('quiz-setup');
    }

    // Toggle Input Kustom Jumlah Soal
    function toggleCustomAmount(value) {
        const customContainer = document.getElementById('custom-amount-container');
        if (value === 'custom') {
            customContainer.classList.remove('hidden');
        } else {
            customContainer.classList.add('hidden');
        }
    }

    // Memulai Kuis
    function startQuiz() {
        selectedBab = document.getElementById('bab-select').value;
        quizMode = document.getElementById('mode-select').value;
        
        // Tentukan jumlah soal
        const amountSelect = document.getElementById('amount-select').value;
        if (amountSelect === 'custom') {
            totalQuestions = parseInt(document.getElementById('custom-amount').value) || 10;
            if (totalQuestions > 200) totalQuestions = 200;
            if (totalQuestions < 1) totalQuestions = 1;
        } else {
            totalQuestions = parseInt(amountSelect);
        }

        // Kumpulkan pangkalan data kata berdasarkan Bab yang dipilih
        let sourcePool = [];
        if (selectedBab === 'semua') {
            for (let bab in vocabulary[currentLevel]) {
                sourcePool = sourcePool.concat(vocabulary[currentLevel][bab]);
            }
        } else {
            sourcePool = [...vocabulary[currentLevel][selectedBab]];
        }

        // Validasi jika data kosong
        if(sourcePool.length === 0) {
            alert("Data kata belum tersedia untuk bab ini!");
            return;
        }

        // Acak pool kata dan potong sesuai jumlah soal yang diminta
        sourcePool.sort(() => Math.random() - 0.5);
        quizPool = sourcePool.slice(0, totalQuestions);
        
        // Reset variabel penampung progress kuis
        currentQuestionIndex = 0;
        score = 0;
        
        showScreen('quiz-area');
        renderQuestion();
    }

    // Menampilkan Soal ke Layar
    function renderQuestion() {
        // Reset Tampilan Romaji
        document.getElementById('romaji-toggle-btn').classList.remove('hidden');
        document.getElementById('romaji-text').classList.add('hidden');

        let currentQuestion = quizPool[currentQuestionIndex];
        
        // Update nomor progress & skor teks
        document.getElementById('progress-text').innerText = `Soal ${currentQuestionIndex + 1} dari ${quizPool.length}`;
        document.getElementById('score-text').innerText = `Skor: ${score}`;

        // Pasang data Romaji di bawah soal (tersembunyi secara default)
        document.getElementById('romaji-text').innerText = `Romaji: ${currentQuestion.romaji}`;

        // Set teks pertanyaan berdasarkan Mode
        if (quizMode === 'jp-id') {
            document.getElementById('question-text').innerText = currentQuestion.jp;
        } else {
            document.getElementById('question-text').innerText = currentQuestion.id;
            // Jika soal bhs Indonesia, romaji otomatis disembunyikan total karena tidak relevan
            document.getElementById('romaji-toggle-btn').classList.add('hidden');
        }

        // Buat Pilihan Jawaban (1 benar, 3 acak dari semua kosakata level tersebut)
        let allItems = [];
        for (let bab in vocabulary[currentLevel]) {
            allItems = allItems.concat(vocabulary[currentLevel][bab]);
        }
        
        // Filter agar jawaban benar tidak double di pilihan acak
        let wrongOptions = allItems.filter(item => item.jp !== currentQuestion.jp);
        wrongOptions.sort(() => Math.random() - 0.5);

        let options = [];
        if (quizMode === 'jp-id') {
            options.push(currentQuestion.id); // Benar
            for(let i=0; i<Math.min(3, wrongOptions.length); i++) {
                options.push(wrongOptions[i].id);
            }
        } else {
            options.push(currentQuestion.jp); // Benar
            for(let i=0; i<Math.min(3, wrongOptions.length); i++) {
                options.push(wrongOptions[i].jp);
            }
        }

        // Acak posisi tombol pilihan jawaban
        options.sort(() => Math.random() - 0.5);

        // Render tombol ke HTML
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        options.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, quizMode === 'jp-id' ? currentQuestion.id : currentQuestion.jp);
            container.appendChild(btn);
        });
    }

    // Cek Jawaban User
    function checkAnswer(selected, correct) {
        if (selected === correct) {
            score += 10; // Tambah skor jika benar
            alert("Benar! 🎉");
        } else {
            alert(`Salah! ❌ Jawaban yang benar adalah: ${correct}`);
        }

        // Lanjut ke soal berikutnya atau selesai
        currentQuestionIndex++;
        if (currentQuestionIndex < quizPool.length) {
            renderQuestion();
        } else {
            endQuiz();
        }
    }

    // Fungsi Klik Tampilkan Romaji
    function revealRomaji() {
        document.getElementById('romaji-toggle-btn').classList.add('hidden');
        document.getElementById('romaji-text').classList.remove('hidden');
    }

    // Selesai Kuis
    function endQuiz() {
        showScreen('result-area');
        document.getElementById('final-score').innerText = score;
        document.getElementById('result-summary').innerText = `Kamu berhasil menyelesaikan kuis!`;
    }

    function restartSetup() {
        selectLevel(currentLevel);
    }

    function confirmExit() {
        if(confirm("Apakah kamu yakin ingin keluar dari kuis ini? Progress akan hilang.")) {
            showScreen('main-menu');
        }
    }
</script>

</body>
</html>
