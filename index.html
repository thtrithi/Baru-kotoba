<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Kotoba Master - N5 & N4</title>
    <style>
        :root {
            --primary: #e74c3c;
            --primary-hover: #c0392b;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --bg: #f5f7fa;
            --success: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            line-height: 1.6;
            padding: 15px;
        }

        .container {
            max-width: 700px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
        }

        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; font-size: 0.95rem; }

        .hidden { display: none !important; }

        /* Menu Utama */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .level-card {
            border: 2px solid var(--light);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #fff;
        }

        .level-card:hover {
            border-color: var(--primary);
            background-color: rgba(231, 76, 60, 0.03);
            transform: translateY(-3px);
        }

        .level-card h2 { font-size: 2.2rem; color: var(--dark); margin-bottom: 5px; }
        .level-card p { font-size: 0.9rem; color: #7f8c8d; }

        /* Form Pengaturan */
        .setup-section {
            margin-top: 15px;
            background: #f9fbfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e6ebf1;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dde4ec;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--dark);
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus { border-color: var(--primary); }

        /* Tombol-tombol */
        .btn {
            display: block;
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2);
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: #95a5a6; margin-top: 10px; box-shadow: none; }
        .btn-secondary:hover { background: #7f8c8d; }

        /* Area Kuis */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 0.95rem;
            background: #edf2f7;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .question-box {
            text-align: center;
            font-size: 2.3rem;
            margin: 25px 0;
            font-weight: 700;
            min-height: 70px;
            word-break: break-all;
            color: #2c3e50;
        }

        .romaji-box {
            text-align: center;
            margin-bottom: 25px;
            min-height: 35px;
        }

        .romaji-btn {
            background: #e2e8f0;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            transition: background 0.2s;
        }
        .romaji-btn:hover { background: #cbd5e0; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 15px 20px;
            text-align: left;
            border-radius: 10px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
            transform: translateX(3px);
        }

        /* Halaman Hasil */
        .result-box { text-align: center; padding: 20px 0; }
        .score { font-size: 4rem; font-weight: 800; color: var(--success); margin: 15px 0; }
        .summary-text { font-size: 1.1rem; color: #4a5568; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Nihongo Kotoba Master</h1>
        <p class="subtitle">Platform Latihan Mandiri Kosakata JLPT N5 & N4</p>
    </header>

    <!-- MENU UTAMA -->
    <div id="main-menu">
        <h3 style="text-align: center; font-size: 1.1rem; color: #4a5568;">Silakan Pilih Tingkatan:</h3>
        <div class="menu-grid">
            <div class="level-card" onclick="selectLevel('N5')">
                <h2>N5</h2>
                <p>Kosakata Dasar Pemula</p>
            </div>
            <div class="level-card" onclick="selectLevel('N4')">
                <h2>N4</h2>
                <p>Kosakata Tingkat Menengah</p>
            </div>
        </div>
    </div>

    <!-- PENGATURAN KUIS -->
    <div id="quiz-setup" class="hidden">
        <h2 id="setup-title" style="font-size: 1.3rem; margin-bottom: 10px;">Pengaturan Kuis</h2>
        
        <div class="setup-section">
            <div class="form-group">
                <label for="bab-select">Pilih Kategori Bab:</label>
                <select id="bab-select"></select>
            </div>

            <div class="form-group">
                <label for="mode-select">Mode Pertanyaan:</label>
                <select id="mode-select">
                    <option value="jp-id">Soal: Bahasa Jepang ➔ Jawab: Indonesia</option>
                    <option value="id-jp">Soal: Indonesia ➔ Jawab: Bahasa Jepang</option>
                </select>
            </div>

            <div class="form-group">
                <label for="amount-select">Jumlah Soal Tantangan:</label>
                <select id="amount-select" onchange="toggleCustomAmount(this.value)">
                    <option value="10">10 Soal</option>
                    <option value="20">20 Soal</option>
                    <option value="35">35 Soal</option>
                    <option value="55">55 Soal</option>
                    <option value="custom">Pilihan Kustom (Sampai 200)</option>
                </select>
            </div>

            <div class="form-group hidden" id="custom-amount-container">
                <label for="custom-amount">Masukkan Jumlah Kustom (1 - 200):</label>
                <input type="number" id="custom-amount" min="1" max="200" value="100">
            </div>

            <button class="btn" onclick="startQuiz()">Mulai Tantangan Sekarang</button>
            <button class="btn btn-secondary" onclick="goBack('main-menu')">Kembali ke Menu Utama</button>
        </div>
    </div>

    <!-- AREA KUIS JALAN -->
    <div id="quiz-area" class="hidden">
        <div class="quiz-header">
            <span id="progress-text">Soal 1 dari 10</span>
            <span id="score-text" style="color: #e67e22;">Skor: 0</span>
        </div>

        <div class="question-box" id="question-text">---</div>

        <div class="romaji-box">
            <button class="romaji-btn" id="romaji-toggle-btn" onclick="revealRomaji()">👁️ Klik untuk lihat Romaji</button>
            <p id="romaji-text" class="hidden" style="font-size: 1.1rem; font-weight: 600; color: #7f8c8d; letter-spacing: 0.5px;"></p>
        </div>

        <div class="options-grid" id="options-container"></div>
        
        <button class="btn btn-secondary" style="margin-top: 25px;" onclick="confirmExit()">Keluar dari Kuis</button>
    </div>

    <!-- HALAMAN HASIL AKHIR -->
    <div id="result-area" class="hidden">
        <div class="result-box">
            <h2>Tantangan Selesai! 🎉</h2>
            <div class="score" id="final-score">0</div>
            <p class="summary-text" id="result-summary">Kamu berhasil menjawab dengan benar!</p>
            <button class="btn" onclick="restartSetup()">Main Lagi Level Ini</button>
            <button class="btn btn-secondary" onclick="goBack('main-menu')">Kembali ke Menu Utama</button>
        </div>
    </div>
</div>

<script>
    // DATABASE KOSAKATA LENGKAP N5 & N4
    const vocabulary = {
        N5: {
            "Bab 1: Kata Ganti & Petunjuk (N5)": [
                { jp: "わたし", romaji: "watashi", id: "Saya" },
                { jp: "あなた", romaji: "anata", id: "Anda / Kamu" },
                { jp: "これ", romaji: "kore", id: "Ini (dekat pembicara)" },
                { jp: "それ", romaji: "sore", id: "Itu (dekat lawan bicara)" },
                { jp: "あれ", romaji: "are", id: "Itu (jauh dari keduanya)" },
                { jp: "ここ", romaji: "koko", id: "Di sini" },
                { jp: "そこ", romaji: "soko", id: "Di mana" },
                { jp: "あそこ", romaji: "asoko", id: "Di sana (jauh)" },
                { jp: "だれ", romaji: "dare", id: "Siapa" },
                { jp: "なに", romaji: "nani", id: "Apa" }
            ],
            "Bab 2: Kata Kerja Dasar Utama (N5)": [
                { jp: "いく", romaji: "iku", id: "Pergi" },
                { jp: "くる", romaji: "kuru", id: "Datang" },
                { jp: "かえる", romaji: "kaeru", id: "Pulang" },
                { jp: "たべる", romaji: "taberu", id: "Makan" },
                { jp: "のむ", romaji: "nomu", id: "Minum" },
                { jp: "みる", romaji: "miru", id: "Melihat / Menonton" },
                { jp: "きく", romaji: "kiku", id: "Mendengar" },
                { jp: "よむ", romaji: "yomu", id: "Membaca" },
                { jp: "かく", romaji: "kaku", id: "Menulis" },
                { jp: "かう", romaji: "kau", id: "Membeli" },
                { jp: "する", romaji: "suru", id: "Melakukan" },
                { jp: "はなす", romaji: "hanasu", id: "Berbicara" },
                { jp: "ねる", romaji: "neru", id: "Tidur" },
                { jp: "おきる", romaji: "okiru", id: "Bangun tidur" }
            ],
            "Bab 3: Kata Sifat Populer (N5)": [
                { jp: "おおきい", romaji: "ookii", id: "Besar" },
                { jp: "ちいさい", romaji: "chiisai", id: "Kecil" },
                { jp: "たかい", romaji: "takai", id: "Mahal / Tinggi" },
                { jp: "やすい", romaji: "yasui", id: "Murah" },
                { jp: "あつい", romaji: "atsui", id: "Panas" },
                { jp: "さむい", romaji: "samui", id: "Dingin (cuaca)" },
                { jp: "つめたい", romaji: "tsumetai", id: "Dingin (benda/minuman)" },
                { jp: "あたらしい", romaji: "atarashii", id: "Baru" },
                { jp: "ふるい", romaji: "furui", id: "Lama / Tua / Kuno" },
                { jp: "いい", romaji: "ii", id: "Bagus / Baik" },
                { jp: "おいしい", romaji: "oishii", id: "Enak / Lezat" }
            ],
            "Bab 4: Keterangan Waktu & Angka (N5)": [
                { jp: "いま", romaji: "ima", id: "Sekarang" },
                { jp: "きょう", romaji: "kyou", id: "Hari ini" },
                { jp: "あした", romaji: "ashita", id: "Besok" },
                { jp: "きのう", romaji: "kinou", id: "Kemarin" },
                { jp: "あさ", romaji: "asa", id: "Pagi" },
                { jp: "ひる", romaji: "hiru", id: "Siang" },
                { jp: "よる", romaji: "yoru", id: "Malam" },
                { jp: "まいにち", romaji: "mainichi", id: "Setiap hari" }
            ],
            "Bab 5: Lingkungan & Kehidupan (N5)": [
                { jp: "いえ", romaji: "ie", id: "Rumah" },
                { jp: "へや", romaji: "heya", id: "Kamar" },
                { jp: "がっこう", romaji: "gakkou", id: "Sekolah" },
                { jp: "せんせい", romaji: "sensei", id: "Guru" },
                { jp: "がくせい", romaji: "gakusei", id: "Siswa / Mahasiswa" },
                { jp: "ともだち", romaji: "tomodachi", id: "Teman" },
                { jp: "ほん", romaji: "hon", id: "Buku" },
                { jp: "くるま", romaji: "kuruma", id: "Mobil" },
                { jp: "みず", romaji: "mizu", id: "Air" },
                { jp: "さかな", romaji: "sakana", id: "Ikan" }
            ]
        },
        N4: {
            "Bab 1: Aktivitas Sehari-hari (N4)": [
                { jp: "あつめる", romaji: "atsumeru", id: "Mengumpulkan" },
                { jp: "いのる", romaji: "inoru", id: "Berdoa / Memohon" },
                { jp: "うける", romaji: "ukeru", id: "Menerima / Mengikuti (ujian)" },
                { jp: "うごく", romaji: "ugoku", id: "Bergerak" },
                { jp: "おどる", romaji: "odoru", id: "Menari" },
                { jp: "かんがえる", romaji: "kangaeru", id: "Memikirkan" },
                { jp: "きがえる", romaji: "kigaeru", id: "Ganti baju" },
                { jp: "こまる", romaji: "komaru", id: "Susah / Bingung / Masalah" },
                { jp: "しらべる", romaji: "shiraberu", id: "Memeriksa / Menyelidiki" },
                { jp: "すてる", romaji: "suteru", id: "Membuang" },
                { jp: "たてる", romaji: "tateru", id: "Mendirikan / Membangun" },
                { jp: "とりかえる", romaji: "torikaeru", id: "Menukar / Mengganti" },
                { jp: "のりかえる", romaji: "norikaeru", id: "Transfer / Ganti Kendaraan" },
                { jp: "みつかる", romaji: "mitsukaru", id: "Ditemukan" }
            ],
            "Bab 2: Tempat & Fasilitas Umum (N4)": [
                { jp: "かいぎしつ", romaji: "kaigishitsu", id: "Ruang Rapat" },
                { jp: "こうじょう", romaji: "koujou", id: "Pabrik" },
                { jp: "ちゅうしゃじょう", romaji: "chuushajou", id: "Tempat Parkir" },
                { jp: "じむしょ", romaji: "jimusho", id: "Kantor" },
                { jp: "うけつけ", romaji: "uketsuke", id: "Bagian Resepsionis / Meja Informasi" },
                { jp: "びよういん", romaji: "biyouin", id: "Salon Kecantikan" },
                { jp: "きょうかい", romaji: "kyoukai", id: "Gereja" },
                { jp: "みなと", romaji: "minato", id: "Pelabuhan" },
                { jp: "がくぶ", romaji: "gakubu", id: "Fakultas (Universitas)" }
            ],
            "Bab 3: Kata Sifat & Kondisi (N4)": [
                { jp: "あんぜん", romaji: "anzen", id: "Aman" },
                { jp: "きけん", romaji: "kiken", id: "Bahaya" },
                { jp: "ふべん", romaji: "fuben", id: "Tidak Praktis / Repot" },
                { jp: "ただしい", romaji: "tadashii", id: "Benar / Tepat" },
                { jp: "めずらしい", romaji: "mezurashii", id: "Langka / Aneh" },
                { jp: "うつくしい", romaji: "utsukushii", id: "Indah / Cantik" },
                { jp: "ひどい", romaji: "hidoi", id: "Kejam / Parah" },
                { jp: "さかん", romaji: "sakan", id: "Populer / Makmur" },
                { jp: "ていねい", romaji: "teinei", id: "Sopan / Ramah" }
            ],
            "Bab 4: Sosial & Gejala Alam (N4)": [
                { jp: "じしん", romaji: "jishin", id: "Gempa Bumi" },
                { jp: "たいふう", romaji: "taifuu", id: "Angin Topan" },
                { jp: "かじ", romaji: "kaji", id: "Kebakaran" },
                { jp: "こうつう", romaji: "koutsuu", id: "Lalu Lintas" },
                { jp: "ほうりつ", romaji: "houritsu", id: "Hukum / Undang-undang" },
                { jp: "せいじ", romaji: "seiji", id: "Politik" },
                { jp: "けいざい", romaji: "keizai", id: "Ekonomi" },
                { jp: "ぶんか", romaji: "bunka", id: "Kebudayaan" }
            ]
        }
    };

    // State Sistem Aplikasi
    let currentLevel = "";
    let selectedBab = "";
    let quizMode = ""; 
    let totalQuestions = 10;
    let quizPool = [];
    let currentQuestionIndex = 0;
    let score = 0;

    // Sistem Navigasi Antarmuka
    function showScreen(screenId) {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('quiz-setup').classList.add('hidden');
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.add('hidden');
        
        document.getElementById(screenId).classList.remove('hidden');
    }

    function goBack(screenId) { showScreen(screenId); }

    // Memilih Tingkat JLPT
    function selectLevel(level) {
        currentLevel = level;
        document.getElementById('setup-title').innerText = `Konfigurasi Kuis - JLPT ${level}`;
        
        const babSelect = document.getElementById('bab-select');
        babSelect.innerHTML = '<option value="semua">Gabungkan Semua Bab (Acak Total)</option>';
        
        for (let bab in vocabulary[level]) {
            let opt = document.createElement('option');
            opt.value = bab;
            opt.innerHTML = bab;
            babSelect.appendChild(opt);
        }

        showScreen('quiz-setup');
    }

    // Tampilkan Form Input Custom Jumlah Soal
    function toggleCustomAmount(value) {
        const customContainer = document.getElementById('custom-amount-container');
        if (value === 'custom') {
            customContainer.classList.remove('hidden');
        } else {
            customContainer.classList.add('hidden');
        }
    }

    // Inisialisasi Bank Soal & Mulai Game
    function startQuiz() {
        selectedBab = document.getElementById('bab-select').value;
        quizMode = document.getElementById('mode-select').value;
        
        const amountSelect = document.getElementById('amount-select').value;
        if (amountSelect === 'custom') {
            totalQuestions = parseInt(document.getElementById('custom-amount').value) || 10;
            if (totalQuestions > 200) totalQuestions = 200;
            if (totalQuestions < 1) totalQuestions = 1;
        } else {
            totalQuestions = parseInt(amountSelect);
        }

        // Kumpulkan data kata
        let sourcePool = [];
        if (selectedBab === 'semua') {
            for (let bab in vocabulary[currentLevel]) {
                sourcePool = sourcePool.concat(vocabulary[currentLevel][bab]);
            }
        } else {
            sourcePool = [...vocabulary[currentLevel][selectedBab]];
        }

        // Acak bank data kosakata
        sourcePool.sort(() => Math.random() - 0.5);
        // Ambil porsi sesuai jumlah target soal yang diinput
        quizPool = sourcePool.slice(0, totalQuestions);
        
        currentQuestionIndex = 0;
        score = 0;
        
        showScreen('quiz-area');
        renderQuestion();
    }

    // Merender Soal dan Pilihan Ganda ke Layar
    function renderQuestion() {
        document.getElementById('romaji-toggle-btn').classList.remove('hidden');
        document.getElementById('romaji-text').classList.add('hidden');

        let currentQuestion = quizPool[currentQuestionIndex];
        
        document.getElementById('progress-text').innerText = `Soal ${currentQuestionIndex + 1} dari ${quizPool.length}`;
        document.getElementById('score-text').innerText = `Skor: ${score}`;
        document.getElementById('romaji-text').innerText = `${currentQuestion.romaji}`;

        // Set Soal Berdasarkan Pilihan Mode Bahasa
        if (
